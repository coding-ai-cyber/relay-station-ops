services:
  postgres:
    image: postgres:16
    container_name: sub2api-ops-postgres
    environment:
      POSTGRES_DB: sub2api_ops
      POSTGRES_USER: sub2api_ops
      POSTGRES_PASSWORD: sub2api_ops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api_ops -d sub2api_ops"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

